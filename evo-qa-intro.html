<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Evo QA — Intro</title>
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800;900&display=swap');
  *{margin:0;padding:0;box-sizing:border-box}
  body{overflow:hidden;background:#0B0B0D;font-family:'Inter',sans-serif}
  @keyframes pulse-glow{0%,100%{transform:translate(-50%,-50%) scale(1);opacity:0.5}50%{transform:translate(-50%,-50%) scale(1.25);opacity:0.9}}
</style>
</head>
<body><div id="root"></div>
<script>
const {createElement:h, createContext, useContext, useState, useEffect, useRef, useCallback} = React;
const TimeContext = createContext({time:0,duration:18});
function useTime(){return useContext(TimeContext).time;}
var __rec=typeof window!=='undefined'&&window.__recording;

const Easing = {
  expoOut: t=>t===1?1:1-Math.pow(2,-10*t),
  easeOut: t=>1-(1-t)*(1-t),
  easeInOut: t=>t<0.5?2*t*t:1-Math.pow(-2*t+2,2)/2,
  overshoot: t=>{const c1=1.70158,c3=c1+1;return 1+c3*Math.pow(t-1,3)+c1*Math.pow(t-1,2);}
};

const C={accent:'#FD5108',accentDim:'rgba(253,81,8,0.12)',accentGlow:'rgba(253,81,8,0.3)',text:'rgba(255,255,255,0.92)',textDim:'rgba(255,255,255,0.50)',textMuted:'rgba(255,255,255,0.3)',cardBg:'rgba(255,255,255,0.04)',cardBorder:'rgba(255,255,255,0.08)'};
const CX=960,CY=540;

function label(txt,st,delay,dur,fs,clr,ls,topY){
  const p=Math.max(0,Math.min(1,(st-delay)/dur));
  const e=Easing.expoOut(p);
  const yOff=8*(1-e);
  return h('div',{style:{position:'absolute',left:CX,top:topY,transform:`translate(-50%,-50%) translateY(${yOff}px)`,opacity:p<0.1?p/0.1:1,fontSize:fs,fontWeight:400,color:clr,letterSpacing:ls,whiteSpace:'nowrap',pointerEvents:'none'}},txt);
}
function tline(txt,st,delay,dur,fs,w,clr,x,y,sY,ls){
  const p=Math.max(0,Math.min(1,(st-delay)/dur));
  const e=Easing.expoOut(p);
  return h('div',{style:{position:'absolute',left:x,top:y,transform:`translate(-50%,-50%) translateY(${sY*(1-e)}px)`,opacity:p<0.1?p/0.1:1,fontSize:fs,fontWeight:w,color:clr,letterSpacing:ls||'normal',whiteSpace:'nowrap',pointerEvents:'none'},
    dangerouslySetInnerHTML:{__html:txt}});
}
function CrossFade(v){return h('div',{style:{position:'absolute',inset:0,background:'#0B0B0D',opacity:1-Math.min(1,Math.max(0,v)),pointerEvents:'none'}});}

function Stage(props){
  const {duration=18,width=1920,height=1080,children}=props;
  const [time,setTime]=useState(0);
  const [playing,setPlaying]=useState(true);
  const [scale,setScale]=useState(1);
  const raf=useRef(null);
  useEffect(()=>{
    function upd(){setScale(Math.min(window.innerWidth/width,(window.innerHeight-56)/height));}
    upd();window.addEventListener('resize',upd);return ()=>window.removeEventListener('resize',upd);
  },[width,height]);
  useEffect(()=>{
    if(!playing)return;
    let cn=false,last=null,first=true;
    function tick(now){
      if(cn)return;
      if(typeof window!=='undefined'&&first){window.__ready=true;first=false;}
      if(last===null){last=now;}
      const d=(now-last)/1000;last=now;
      setTime(p=>{const n=p+d;return n>=duration?(window.__recording?duration-0.001:0):n;});
      raf.current=requestAnimationFrame(tick);
    }
    raf.current=requestAnimationFrame(tick);
    return ()=>{cn=true;cancelAnimationFrame(raf.current);};
  },[playing,duration]);
  const progress=time/duration;
  const seek=useCallback(e=>{
    const r=e.currentTarget.getBoundingClientRect();
    setTime(Math.max(0,Math.min(duration,((e.clientX-r.left)/r.width)*duration)));
    setPlaying(false);
  },[duration]);
  return h(TimeContext.Provider,{value:{time,duration}},
    h('div',{style:{position:'fixed',inset:0,background:'#000',display:'flex',flexDirection:'column',fontFamily:'Inter,sans-serif'}},
      h('div',{style:{flex:1,position:'relative',overflow:'hidden'}},
        h('div',{style:{position:'absolute',left:'50%',top:0,transformOrigin:'top left',overflow:'hidden',width,height,background:'#0B0B0D',transform:`translate(-50%,0) scale(${scale})`}},children)),
      h('div',{style:{height:56,display:'flex',alignItems:'center',gap:12,padding:'0 20px',background:'rgba(0,0,0,0.85)',borderTop:'1px solid rgba(255,255,255,0.08)'}},
        h('button',{style:{background:'none',border:'1px solid rgba(255,255,255,0.3)',color:'#fff',padding:'6px 14px',borderRadius:4,cursor:'pointer',fontSize:12},onClick:()=>setPlaying(p=>!p)},playing?'⏸':'▶'),
        h('button',{style:{background:'none',border:'1px solid rgba(255,255,255,0.3)',color:'#fff',padding:'6px 14px',borderRadius:4,cursor:'pointer',fontSize:12},onClick:()=>setTime(0)},'⏮'),
        h('div',{style:{fontFamily:'monospace',minWidth:90,color:'#888',fontSize:12}},time.toFixed(1)+'s / '+duration+'s'),
        h('div',{style:{flex:1,height:4,background:'rgba(255,255,255,0.2)',borderRadius:2,position:'relative',cursor:'pointer'},onMouseDown:seek},
          h('div',{style:{position:'absolute',top:0,left:0,height:'100%',background:'#FD5108',borderRadius:2,width:progress*100+'%',pointerEvents:'none'}}),
          h('div',{style:{position:'absolute',top:'50%',width:12,height:12,background:'#FD5108',borderRadius:'50%',transform:'translate(-50%,-50%)',left:progress*100+'%',pointerEvents:'none'}})))
    )
  );
}

// ═══ Scenes ═══

function SceneHero(t){
  const p1=Math.max(0,Math.min(1,t/0.8));
  const e1=Easing.expoOut(p1);
  const d1=Math.max(0,Math.min(1,(t-0.8)/0.6));
  const e2=Easing.expoOut(d1);
  const d2=Math.max(0,Math.min(1,(t-1.2)/0.5));
  const lineW=240*Easing.expoOut(d2);
  return h('div',{style:{position:'absolute',inset:0,pointerEvents:'none'}},
    h('div',{style:{position:'absolute',left:CX,top:CY-100,transform:`translate(-50%,-50%) translateY(${40*(1-e1)}px)`,opacity:p1<0.12?p1/0.12:1}},
      h('span',{style:{fontSize:96,fontWeight:900,color:C.accent,letterSpacing:'-0.03em'}},'Evo'),
      h('span',{style:{fontSize:96,fontWeight:300,color:C.text,letterSpacing:'-0.02em',marginLeft:8}},'QA')),
    h('div',{style:{position:'absolute',left:CX,top:CY-20,transform:`translate(-50%,-50%) translateY(${16*(1-e2)}px)`,opacity:Math.min(1,d1*2),fontSize:17,fontWeight:400,color:C.textDim,letterSpacing:'0.15em',whiteSpace:'nowrap'}},'AN EVOLVING QA ENGINEER IN A BOX'),
    lineW>0?h('div',{style:{position:'absolute',left:CX-120,top:CY+18,width:lineW,height:2.5,background:C.accent,borderRadius:2,pointerEvents:'none'}}):null);
}

function SceneBrain(st){
  const p=Math.min(1,st/3);
  const cp=Math.max(0,Math.min(1,(st-0)/0.55));
  const nodes=[{e:'🧪',a:0},{e:'🧠',a:72},{e:'📊',a:144},{e:'🔁',a:216},{e:'💡',a:288}];
  const items=[label('LEARNS · EVOLVES · REMEMBERS',st,0.1,0.5,13,C.textMuted,'0.18em',CY-175)];
  items.push(h('div',{style:{position:'absolute',left:CX,top:CY-50,transform:'translate(-50%,-50%)',width:120,height:120,borderRadius:'50%',background:'radial-gradient(circle,'+C.accentGlow+' 0%,transparent 70%)',opacity:Math.min(1,p*2),pointerEvents:'none',animation:'pulse-glow 3s ease-in-out infinite'}}));
  items.push(h('div',{style:{position:'absolute',left:CX,top:CY-50,transform:`translate(-50%,-50%) scale(${Easing.overshoot(cp)})`,opacity:Math.min(1,cp*2),pointerEvents:'none'}},
    h('div',{style:{width:76,height:76,borderRadius:'50%',border:'2.5px solid '+C.accent,background:C.accentDim,display:'flex',alignItems:'center',justifyContent:'center',fontSize:30}},'⚡')));
  nodes.forEach((n,i)=>{
    const ang=(n.a+p*60)*Math.PI/180;
    const no=Math.max(0,Math.min(1,(p-0.15)*3));
    items.push(h('div',{style:{position:'absolute',left:CX+Math.cos(ang)*95,top:CY-50+Math.sin(ang)*95,transform:'translate(-50%,-50%)',width:38,height:38,borderRadius:'50%',background:C.cardBg,border:'1px solid '+C.cardBorder,display:'flex',alignItems:'center',justifyContent:'center',fontSize:17,opacity:no,pointerEvents:'none'}}));
  });
  items.push(tline('Knowledge grows with every project you run.',st,0.6,0.6,15,300,C.text,CX+40,CY+40,12));
  items.push(tline('Feeds on docs <i>&amp;</i> screenshots. Plans tests. Carries experience forward.',st,0.9,0.6,13,300,C.textDim,CX+40,CY+66,10));
  return h('div',{style:{position:'absolute',inset:0,pointerEvents:'none'}},...items);
}

function SceneFeatures(st){
  const features=[{ic:'🧠',ti:'Learn',de:'Feeds on docs, screenshots & specs. Every run makes the brain smarter.'},
                  {ic:'🧪',ti:'Test',de:'Autonomous Playwright testing. Detects flakiness, adapts strategies.'},
                  {ic:'📦',ti:'Share',de:'Export via CTRF, mem0 & OKF. Portable knowledge across teams.'}];
  const items=[label('THREE CORE SUPERPOWERS',st,0,0.4,13,C.textMuted,'0.16em',CY-155)];
  features.forEach((f,i)=>{
    const p=Math.max(0,Math.min(1,(st-(0.2+i*0.2))/0.5));
    const e=Easing.expoOut(p);
    items.push(h('div',{style:{position:'absolute',left:CX-290+i*290,top:CY+15,width:248,padding:'22px 20px',borderRadius:12,background:C.cardBg,border:'1px solid '+C.cardBorder,transform:'translateY('+(35*(1-e))+'px)',opacity:e,pointerEvents:'none'}},
      h('div',{style:{fontSize:28,marginBottom:10}},f.ic),
      h('div',{style:{fontSize:17,fontWeight:600,color:C.text,marginBottom:6}},f.ti),
      h('div',{style:{fontSize:12.5,fontWeight:300,color:C.textDim,lineHeight:1.55}},f.de)));
  });
  return h('div',{style:{position:'absolute',inset:0,pointerEvents:'none'}},...items);
}

function ScenePipeline(st){
  const steps=[{ic:'📄',lb:'Docs'},{ic:'🧠',lb:'Analyze'},{ic:'📋',lb:'Plan'},{ic:'🧪',lb:'Test'},{ic:'📊',lb:'Report'}];
  const items=[label('END-TO-END PIPELINE',st,0,0.4,13,C.textMuted,'0.16em',CY-175)];
  for(let i=0;i<steps.length-1;i++){
    const dp=Math.max(0,Math.min(1,(st-(0.15+i*0.08))/0.3));
    items.push(h('div',{style:{position:'absolute',left:CX-340+i*170+24,top:CY-10,width:130*Easing.easeOut(dp),height:1.5,background:'linear-gradient(90deg,'+C.accent+'99,'+C.cardBorder+')',transform:'translateY(-50%)',opacity:Math.min(1,dp*2),pointerEvents:'none'}}));
  }
  steps.forEach((s,i)=>{
    const dp=Math.max(0,Math.min(1,(st-(0.15+i*0.1))/0.4));
    items.push(h('div',{style:{position:'absolute',left:CX-340+i*170,top:CY-10,transform:'translate(-50%,-50%)',opacity:Math.min(1,dp*2),pointerEvents:'none'}},
      h('div',{style:{width:46,height:46,borderRadius:'50%',background:i===0||i===steps.length-1?C.accent:C.cardBg,border:'1.5px solid '+(i===0||i===steps.length-1?C.accent:C.cardBorder),display:'flex',alignItems:'center',justifyContent:'center',fontSize:19,margin:'0 auto',transform:'scale('+Easing.overshoot(dp)+')'}},s.ic),
      h('div',{style:{fontSize:10.5,color:C.textDim,marginTop:8,textAlign:'center',whiteSpace:'nowrap'}},s.lb)));
  });
  items.push(tline('Self-contained CTRF reports <i>+</i> accumulated brain knowledge',st,1.2,0.5,12,300,C.textDim,CX,CY+70,8));
  return h('div',{style:{position:'absolute',inset:0,pointerEvents:'none'}},...items);
}

function SceneClosing(st){
  const items=[];
  const cp=Math.max(0,Math.min(1,st/0.55));
  items.push(h('div',{style:{position:'absolute',inset:0,background:'radial-gradient(ellipse at center,'+C.accentDim+' 0%,transparent 65%)',opacity:Math.min(1,st*1.5),pointerEvents:'none'}}));
  items.push(h('div',{style:{position:'absolute',left:CX,top:CY-55,transform:'translate(-50%,-50%) scale('+Easing.overshoot(cp)+')',opacity:Math.min(1,cp*2),pointerEvents:'none'}},
    h('div',{style:{width:80,height:80,borderRadius:'50%',border:'2.5px solid '+C.accent,background:C.accentDim,display:'flex',alignItems:'center',justifyContent:'center',fontSize:34}},'⚡')));
  items.push(tline('Evo QA',st,0.3,0.6,44,800,C.accent,CX,CY+10,16));
  items.push(tline('The QA Engineer That Grows With Your Product',st,0.7,0.5,16,300,C.textDim,CX,CY+60,12,'0.1em'));
  items.push(tline('github.com/your-org/evo-qa',st,1.1,0.4,12,400,C.accent,CX,CY+100,8));
  items.push(h('div',{style:{position:'absolute',bottom:24,right:32,fontSize:11,color:'rgba(255,255,255,0.25)',letterSpacing:'0.15em',fontFamily:'monospace',pointerEvents:'none',zIndex:100,opacity:Math.min(1,(st-0.5)*2)}},'Created by Huashu-Design'));
  return h('div',{style:{position:'absolute',inset:0,pointerEvents:'none'}},...items);
}

// ═══ App ═══
function App(){
  const t=useTime();
  const kids=[];

  if(t<3.5){
    kids.push(SceneHero(t));
    if(t>=2.8) kids.push(CrossFade((3.5-t)/0.5));
  }
  if(t>=3&&t<7.5){
    kids.push(SceneBrain(t-3));
    if(t>=3&&t<3.5) kids.push(CrossFade((t-3)/0.5));
    if(t>=7&&t<7.5) kids.push(CrossFade((7.5-t)/0.5));
  }
  if(t>=7&&t<12.5){
    kids.push(SceneFeatures(t-7));
    if(t>=7&&t<7.5) kids.push(CrossFade((t-7)/0.5));
    if(t>=12&&t<12.5) kids.push(CrossFade((12.5-t)/0.5));
  }
  if(t>=12&&t<17){
    kids.push(ScenePipeline(t-12));
    if(t>=12&&t<12.5) kids.push(CrossFade((t-12)/0.5));
    if(t>=16.5&&t<17) kids.push(CrossFade((17-t)/0.5));
  }
  if(t>=16) kids.push(SceneClosing(t-16));

  return h('div',{style:{position:'absolute',inset:0}},...kids);
}

ReactDOM.createRoot(document.getElementById('root')).render(h(Stage,{duration:18},h(App)));
</script>
</body>
</html>
